<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — TaxOps</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-sm">

    <!-- Brand -->
    <div class="flex items-center justify-center gap-3 mb-8">
      <div class="w-9 h-9 bg-blue-500 rounded-xl flex items-center justify-center text-white font-bold text-lg select-none shadow-lg">T</div>
      <span class="font-bold text-white text-2xl tracking-tight">TaxOps</span>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <h1 class="text-slate-800 font-bold text-xl mb-1">Sign in</h1>
      <p class="text-slate-500 text-sm mb-6">Internal use only — authorised staff only.</p>

      {% if error %}
      <div class="mb-5 px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm flex items-center gap-2">
        <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
        </svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="post" autocomplete="off" class="space-y-4">
        <div>
          <label for="username" class="block text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1.5">Username</label>
          <input
            id="username" name="username" type="text"
            autocomplete="username" spellcheck="false"
            required autofocus
            class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm text-slate-800 placeholder-slate-400
                   focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition"
            placeholder="Enter username"
          >
        </div>

        <div>
          <label for="password" class="block text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1.5">Password</label>
          <input
            id="password" name="password" type="password"
            autocomplete="current-password"
            required
            class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm text-slate-800 placeholder-slate-400
                   focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition"
            placeholder="Enter password"
          >
        </div>

        <button
          type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold rounded-lg py-2.5 text-sm
                 transition-colors shadow-sm mt-2"
        >
          Sign in
        </button>
      </form>
    </div>

    <p class="text-center text-slate-500 text-xs mt-6">TaxOps &mdash; Internal Workflow Tool</p>
  </div>

</body>
</html>
